# Preset Configuration for AGENTS.md Generation
# Each preset defines all variables needed by preset-template.md
# Generated files go to project/presets/{key}/AGENTS.md

presets:

  generic:
    name: Generic
    overview: A generic software project. Use this preset when no more specific stack is detected.
    commands: |
      install:  # fill in from package manager or build tool
      dev:      # fill in the local development command
      build:    # fill in the production build command
      test:     # fill in the test command
      lint:     # fill in the lint command
      format:   # fill in the format command
    tech_stack: |
      | Language    |            |
      | Framework   |            |
      | Database    |            |
      | Auth        |            |
      | Hosting     |            |
      | Package Mgr |            |
    code_style: |
      - Keep the preset aligned with the repository's real conventions
      - Prefer simple, explicit code over clever abstractions
      - Document any stack-specific constraints in the project root `AGENTS.md`
      - Verify exact versions from manifests before making assumptions
    skills: |
      - Use `find-skills` to discover relevant skills before non-trivial work
      - Install stack-specific skills only when they are relevant to this repository
      - Record useful project-specific skills in the project root `AGENTS.md`
    test_command: fill in the real command
    test_framework: fill in
    testing: |
      - Unit tests: fill in the real location
      - Integration tests: fill in the real location
      - E2E tests: fill in the real location
    never_modify: |
      - Generated files
      - Build outputs
      - Secrets or local environment files
    external_services: ""

  nextjs:
    name: Next.js
    overview: A Next.js 15 web application using the App Router, TypeScript, and Tailwind CSS.
    commands: |
      install:  npm install
      dev:      npm run dev
      build:    npm run build
      test:     npm test
      lint:     npm run lint
      format:   npx prettier --write .
    tech_stack: |
      | Language | TypeScript 5.x        |
      | Framework| Next.js 15 (App Router) |
      | Styling  | Tailwind CSS 4        |
      | Database | Supabase (PostgreSQL) |
      | Auth     | Supabase Auth         |
      | Hosting  | Vercel                |
    code_style: |
      - Use Server Components by default; add "use client" only when needed
      - Named exports only - no default exports except `page.tsx` and `layout.tsx`
      - Co-locate route-specific components with their page
      - Use `cn()` for conditional class merging
      - Prefer Server Actions over API routes for mutations
    skills: |
      - Use `find-skills` to discover skills matching your current task before starting
      - Install stack-specific skills only when they match the feature area
      - Keep skill dependencies documented in the project root AGENTS.md
    test_command: npm test
    test_framework: Vitest
    testing: |
      - Unit tests: co-located as `*.test.ts` next to source files
      - E2E tests: `tests/e2e/` using Playwright
      - All API handlers and auth paths must have tests
    never_modify: |
      - `supabase/migrations/` - migrations are append-only
      - `public/` - static assets managed separately
      - `.env.local` - contains secrets, never commit
    external_services: |
      **External services:**
      - Supabase - use local dev instance for testing, never hit production
      - Stripe - test keys only in development

  dotnet:
    name: .NET
    overview: A .NET 9 Web API using Clean Architecture with Entity Framework Core and SQL Server.
    commands: |
      install:  dotnet restore
      dev:      dotnet run --project src/Api
      build:    dotnet build
      test:     dotnet test
      lint:     dotnet format --verify-no-changes
      format:   dotnet format
    tech_stack: |
      | Language | C# 13 / .NET 9           |
      | Framework| ASP.NET Core Minimal API  |
      | ORM      | Entity Framework Core 9   |
      | Database | SQL Server               |
      | Auth     | ASP.NET Identity + JWT   |
      | Hosting  | Azure App Service        |
    code_style: |
      - Clean Architecture layers: Api -> Application -> Domain -> Infrastructure
      - All database access via repository interfaces in Application, implementations in Infrastructure
      - Use record types for DTOs and value objects
      - Prefer `IResult` return types in endpoint handlers
      - No business logic in controllers/endpoints - delegate to Application services
      - Use `CancellationToken` on all async methods
    skills: |
      - Use `find-skills` to discover skills matching your current task before starting
      - Install stack-specific skills only when they match the feature area
      - Keep skill dependencies documented in the project root AGENTS.md
    test_command: dotnet test
    test_framework: xUnit
    testing: |
      - Unit tests: `tests/UnitTests/` mirroring src structure
      - Integration tests: `tests/IntegrationTests/` using WebApplicationFactory
      - All public API endpoints must have integration tests
      - Use NSubstitute for mocking, FluentAssertions for assertions
    never_modify: |
      - `src/Domain/` entities without updating corresponding migrations
      - `Migrations/` - EF migrations are append-only, create new ones instead
      - `appsettings.Production.json` - production config managed by CI/CD
    external_services: |
      **External services:**
      - SQL Server - use LocalDB or Docker for local dev
      - Azure - never deploy from local machine, CI/CD only

  python:
    name: Python
    overview: A Python 3.12 FastAPI application with SQLAlchemy ORM and PostgreSQL.
    commands: |
      install:  uv sync
      dev:      uv run fastapi dev src/main.py
      build:    uv build
      test:     uv run pytest
      lint:     uv run ruff check .
      format:   uv run ruff format .
      typecheck: uv run mypy src/
    tech_stack: |
      | Language    | Python 3.12            |
      | Framework   | FastAPI                |
      | ORM         | SQLAlchemy 2.x         |
      | Database    | PostgreSQL             |
      | Auth        | JWT via python-jose    |
      | Hosting     | Docker + Railway/Fly.io |
      | Package Mgr | uv                     |
    code_style: |
      - Type hints on all function signatures - `mypy --strict` must pass
      - Use Pydantic v2 models for all request/response schemas
      - Dependency injection via FastAPI `Depends()`
      - Async endpoints and database sessions throughout
      - One module per domain concept in `src/domains/`
      - Prefer `pathlib.Path` over string path manipulation
    skills: |
      - Use `find-skills` to discover skills matching your current task before starting
      - Install stack-specific skills only when they match the feature area
      - Keep skill dependencies documented in the project root AGENTS.md
    test_command: uv run pytest
    test_framework: pytest + pytest-asyncio
    testing: |
      - Unit tests: `tests/unit/` mirroring src structure
      - Integration tests: `tests/integration/` with test database
      - Fixtures in `tests/conftest.py` - shared database session, test client
      - All API endpoints must have integration tests
    never_modify: |
      - `alembic/versions/` - migrations are append-only
      - `.env` - secrets, never commit
      - `src/generated/` - auto-generated OpenAPI client, do not edit
    external_services: |
      **External services:**
      - PostgreSQL - use Docker Compose for local dev
      - Redis - use fakeredis in tests

  nodejs:
    name: Node.js
    overview: A Node.js application or service, typically using TypeScript, npm/pnpm, and a conventional package manifest.
    commands: |
      install:  npm install
      dev:      npm run dev
      build:    npm run build
      test:     npm test
      lint:     npm run lint
      format:   npx prettier --write .
    tech_stack: |
      | Language    | TypeScript / JavaScript |
      | Framework   | Node.js service or app |
      | Database    | Fill in |
      | Auth        | Fill in |
      | Hosting     | Fill in |
      | Package Mgr | npm / pnpm / yarn |
    code_style: |
      - Prefer explicit async boundaries and avoid callback-style APIs unless required
      - Keep server code and client code in separate folders when both exist
      - Use one top-level module per domain feature
      - Prefer ESM unless the project already uses CommonJS
      - Document any runtime-specific rules in the root `AGENTS.md`
    skills: |
      - Use `find-skills` to discover skills matching your current task before starting
      - Install stack-specific skills only when they match the feature area
      - Keep skill dependencies documented in the project root AGENTS.md
    test_command: npm test
    test_framework: project test runner
    testing: |
      - Unit tests: `*.test.ts` or `*.spec.ts`
      - Integration tests: `tests/integration/`
      - E2E tests: `tests/e2e/`
    never_modify: |
      - `node_modules/`
      - build outputs such as `dist/` or `.next/`
      - `.env` files or checked-in secrets
    external_services: |
      **External services:**
      - Use local or sandbox endpoints for any hosted API
      - Never commit credentials into config files

  go:
    name: Go
    overview: A Go application, service, or CLI built around standard Go modules and the Go toolchain.
    commands: |
      install:  go mod download
      dev:      go run ./...
      build:    go build ./...
      test:     go test ./...
      lint:     golangci-lint run
      format:   gofmt -w .
    tech_stack: |
      | Language    | Go |
      | Framework   | Standard library or project framework |
      | Database    | Fill in |
      | Auth        | Fill in |
      | Hosting     | Fill in |
      | Package Mgr | Go modules |
    code_style: |
      - Keep packages small and focused
      - Export only what is needed by other packages
      - Prefer simple error handling over abstraction-heavy wrappers
      - Use context-aware APIs for network and database work
      - Document concurrency or goroutine ownership rules in the root `AGENTS.md`
    skills: |
      - Use `find-skills` to discover skills matching your current task before starting
      - Install stack-specific skills only when they match the feature area
      - Keep skill dependencies documented in the project root AGENTS.md
    test_command: go test ./...
    test_framework: go test
    testing: |
      - Unit tests: `_test.go` files beside the source package
      - Integration tests: package-specific directories or tagged tests
      - E2E tests: project-specific if present
    never_modify: |
      - `vendor/` unless the repo intentionally vendors dependencies
      - generated code directories
      - secret files or local environment files
    external_services: |
      **External services:**
      - Use local test doubles or containers for databases and queues

