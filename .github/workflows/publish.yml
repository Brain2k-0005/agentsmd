name: Publish to npm

on:
  release:
    types: [published]

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint install.sh
        run: shellcheck install.sh
      - name: Lint generate-presets.sh
        run: shellcheck templates/generate-presets.sh
      - name: Install bats
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local
      - name: Run tests
        run: bats tests/install_test.bats
      - name: Verify preset generation
        run: |
          bash templates/generate-presets.sh
          if ! git diff --exit-code project/presets/; then
            echo "::error::Presets drifted from template"
            exit 1
          fi

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Set version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
